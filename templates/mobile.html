<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加减法算术练习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .problem-card {
            transition: all 0.2s ease;
        }
        .problem-card:active {
            transform: scale(0.98);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="p-3">
    <!-- 设置面板 -->
    <div class="glass-panel rounded-2xl p-4 mb-4 shadow-lg">
        <h1 class="text-2xl font-extrabold text-center mb-4">
            <span class="gradient-text">加减法练习</span>
        </h1>
        
        <div class="space-y-3">
            <div>
                <div class="flex justify-between text-sm text-gray-700 mb-1">
                    <span>题目数量</span>
                    <span id="countDisplay" class="font-bold text-indigo-600">10</span>
                </div>
                <input type="range" id="problemCount" min="5" max="20" value="10" class="w-full">
            </div>
            
            <div>
                <div class="flex justify-between text-sm text-gray-700 mb-1">
                    <span>最大数字</span>
                    <span id="maxNumDisplay" class="font-bold text-indigo-600">50</span>
                </div>
                <input type="range" id="maxNumber" min="10" max="100" value="50" class="w-full">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">运算类型</label>
                <div class="grid grid-cols-2 gap-2">
                    <label id="addLabel" class="flex items-center justify-center gap-1 p-2 border-2 rounded-lg">
                        <input type="checkbox" id="allowAdd" checked class="hidden">
                        <span class="text-gray-700">➕ 加法</span>
                    </label>
                    <label id="subLabel" class="flex items-center justify-center gap-1 p-2 border-2 rounded-lg">
                        <input type="checkbox" id="allowSub" checked class="hidden">
                        <span class="text-gray-700">➖ 减法</span>
                    </label>
                    <label id="mulLabel" class="flex items-center justify-center gap-1 p-2 border-2 rounded-lg">
                        <input type="checkbox" id="allowMul" class="hidden">
                        <span class="text-gray-700">× 乘法</span>
                    </label>
                    <label id="divLabel" class="flex items-center justify-center gap-1 p-2 border-2 rounded-lg">
                        <input type="checkbox" id="allowDiv" class="hidden">
                        <span class="text-gray-700">÷ 除法</span>
                    </label>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <button class="complexity-btn py-2 rounded-lg border-2 border-gray-200 text-sm font-medium bg-white" data-complexity="1">简单</button>
                <button class="complexity-btn py-2 rounded-lg border-2 border-indigo-500 text-sm font-medium bg-indigo-50 text-indigo-700" data-complexity="2">中等</button>
                <button class="complexity-btn py-2 rounded-lg border-2 border-gray-200 text-sm font-medium bg-white" data-complexity="3">困难</button>
            </div>
            
            <button id="generateBtn" class="btn-primary w-full py-3 rounded-xl text-white font-bold shadow-lg">
                🚀 生成题目
            </button>
        </div>
        
        <!-- 统计 -->
        <div id="statsPanel" class="mt-4 p-3 rounded-xl bg-gray-50 hidden">
            <div class="flex justify-around text-center">
                <div>
                    <div id="correctCount" class="text-xl font-bold text-green-600">0</div>
                    <div class="text-xs text-gray-500">正确</div>
                </div>
                <div>
                    <div id="wrongCount" class="text-xl font-bold text-red-500">0</div>
                    <div class="text-xs text-gray-500">错误</div>
                </div>
                <div>
                    <div id="accuracy" class="text-xl font-bold text-indigo-600">0%</div>
                    <div class="text-xs text-gray-500">正确率</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 答题区 -->
    <div class="glass-panel rounded-2xl p-4 shadow-lg">
        <div class="flex justify-between items-center mb-3">
            <h2 class="font-bold text-gray-800">答题区</h2>
            <div class="flex gap-2">
                <button id="checkAllBtn" class="px-3 py-1.5 bg-green-500 text-white rounded-lg text-sm font-medium" disabled>检查</button>
                <button id="exportPdfBtn" class="px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm font-medium" disabled>导出</button>
            </div>
        </div>
        
        <div id="problemsContainer" class="space-y-3">
            <div class="text-center py-10 text-gray-400">
                <p>点击"生成题目"开始</p>
            </div>
        </div>
    </div>

    <script>
        let currentProblems = [];
        let complexity = 2;
        let stats = { correct: 0, wrong: 0 };

        const problemCountSlider = document.getElementById('problemCount');
        const maxNumberSlider = document.getElementById('maxNumber');
        
        problemCountSlider.oninput = () => document.getElementById('countDisplay').textContent = problemCountSlider.value;
        maxNumberSlider.oninput = () => document.getElementById('maxNumDisplay').textContent = maxNumberSlider.value;

        // 运算类型选择
        ['add', 'sub', 'mul', 'div'].forEach(op => {
            const label = document.getElementById(op + 'Label');
            const checkbox = document.getElementById('allow' + op.charAt(0).toUpperCase() + op.slice(1));
            label.onclick = () => {
                checkbox.checked = !checkbox.checked;
                label.classList.toggle('border-indigo-500', checkbox.checked);
                label.classList.toggle('bg-indigo-50', checkbox.checked);
            };
            label.classList.toggle('border-indigo-500', checkbox.checked);
            label.classList.toggle('bg-indigo-50', checkbox.checked);
        });

        // 复杂度
        document.querySelectorAll('.complexity-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.complexity-btn').forEach(b => {
                    b.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
                });
                btn.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
                complexity = parseInt(btn.dataset.complexity);
            };
        });

        document.getElementById('generateBtn').onclick = renderProblems;
        document.getElementById('checkAllBtn').onclick = checkAll;
        
        document.getElementById('exportPdfBtn').onclick = () => {
            if (currentProblems.length === 0) return;
            fetch('/export-pdf', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({problems: currentProblems})
            })
            .then(r => r.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'math-practice.pdf';
                a.click();
                URL.revokeObjectURL(url);
            });
        };

        function renderProblems() {
            const count = parseInt(problemCountSlider.value);
            const maxNum = parseInt(maxNumberSlider.value);
            const allowAdd = document.getElementById('allowAdd').checked;
            const allowSub = document.getElementById('allowSub').checked;
            const allowMul = document.getElementById('allowMul').checked;
            const allowDiv = document.getElementById('allowDiv').checked;
            const segments = complexity + 1;

            if (!allowAdd && !allowSub && !allowMul && !allowDiv) {
                alert('请至少选择一种运算！');
                return;
            }

            fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({count, maxNum, allowAdd, allowSub, allowMul, allowDiv, segments})
            })
            .then(r => r.json())
            .then(data => {
                currentProblems = data.problems;
                const container = document.getElementById('problemsContainer');
                container.innerHTML = '';
                
                currentProblems.forEach((problem, i) => {
                    problem.userAnswer = null;
                    problem.checked = false;
                    container.appendChild(createCard(problem, i));
                });
                
                document.getElementById('checkAllBtn').disabled = false;
                document.getElementById('exportPdfBtn').disabled = false;
                stats = { correct: 0, wrong: 0 };
                updateStats();
                document.getElementById('statsPanel').classList.remove('hidden');
            });
        }

        function createCard(problem, index) {
            const div = document.createElement('div');
            div.className = 'problem-card bg-white rounded-xl p-3 border border-gray-200';
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-gray-400">#${index + 1}</span>
                    <span class="status-icon hidden text-lg">✅</span>
                </div>
                <div class="flex items-center justify-center gap-2 text-lg font-bold text-gray-800 mb-2 flex-wrap">
                    ${renderExpr(problem)}
                    <span>=</span>
                    <input type="number" class="w-16 px-2 py-1 border-2 border-gray-300 rounded-lg text-center text-indigo-600 text-lg" data-index="${index}" placeholder="?">
                </div>
                <button class="check-btn w-full py-2 bg-indigo-100 text-indigo-700 rounded-lg text-sm font-medium" data-index="${index}">检查</button>
            `;
            
            div.querySelector('.check-btn').onclick = () => checkSingle(index);
            div.querySelector('input').onkeypress = (e) => { if (e.key === 'Enter') checkSingle(index); };
            return div;
        }

        function renderExpr(p) {
            let html = `<span>${p.numbers[0]}</span>`;
            p.operators.forEach((op, i) => {
                const color = op === '+' ? 'text-green-600' : 'text-red-500';
                html += `<span class="${color}">${op}</span><span>${p.numbers[i + 1]}</span>`;
            });
            return html;
        }

        function checkSingle(index) {
            const p = currentProblems[index];
            const input = document.querySelector(`input[data-index="${index}"]`);
            const card = input.closest('.problem-card');
            const value = parseInt(input.value);
            if (isNaN(value)) { input.focus(); return; }
            
            p.userAnswer = value;
            p.checked = true;
            
            const isCorrect = value === p.answer;
            card.querySelector('.status-icon').classList.toggle('hidden', !isCorrect);
            card.querySelector('.status-icon').textContent = isCorrect ? '✅' : '❌';
            input.disabled = true;
            const btn = card.querySelector('.check-btn');
            btn.disabled = true;
            btn.textContent = isCorrect ? '正确 ✓' : `答案: ${p.answer}`;
            btn.className = `check-btn w-full py-2 rounded-lg text-sm font-medium ${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            
            stats[isCorrect ? 'correct' : 'wrong']++;
            updateStats();
        }

        function checkAll() {
            currentProblems.forEach((_, i) => { if (!currentProblems[i].checked) checkSingle(i); });
        }

        function updateStats() {
            document.getElementById('correctCount').textContent = stats.correct;
            document.getElementById('wrongCount').textContent = stats.wrong;
            const total = stats.correct + stats.wrong;
            document.getElementById('accuracy').textContent = total > 0 ? Math.round((stats.correct / total) * 100) + '%' : '0%';
        }

        renderProblems();
    </script>
</body>
</html>
